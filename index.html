<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram NFC</title>
</head>
<body>
  <script>
    // 1️⃣ CONTATORE (crea + incrementa)
    var img = new Image();
    img.src = "https://docs.google.com/spreadsheets/d/1XQuJV5Ft2CoW_NirZnMKC2aRk98-ooMxlpJmx5sai6s/edit?gid=0#gid=0" + Date.now();

    // 2️⃣ RILEVA DEVICE
    var ua = navigator.userAgent || navigator.vendor || window.opera;

    // 3️⃣ DOPO UN ATTIMO APRI APP
    setTimeout(function () {

      // ANDROID → più stabile
      if (/android/i.test(ua)) {
        window.location.href = "intent://www.instagram.com/leonardogriguolo/#Intent;package=com.instagram.android;scheme=https;end";
      } 
      // IPHONE
      else {
        window.location.href = "instagram://user?username=leonardogriguolo";
      }

      // 4️⃣ FALLBACK WEB (se app non si apre)
      setTimeout(function () {
        window.location.href = "https://www.instagram.com/leonardogriguolo/";
      }, 1200);

    }, 500);
  </script>
</body>
</html>
