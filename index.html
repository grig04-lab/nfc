 <!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apri Instagram</title>
</head>
<body>
  <script>
    const trackingUrl = "https://script.google.com/macros/s/AKfycby2AO6ogQsN4D2orD8TwCKVxIzW8PbMntR0iNcmsol7YUlkqfa6W1WWfsan8fws--AKAg/exec?src=nfc&ua=" + encodeURIComponent(navigator.userAgent);
    const instagramAppUrl = "instagram://user?username=leonardogriguolo";
    const instagramWebUrl = "https://instagram.com/leonardogriguolo";

    // manda il conteggio al Google Sheet tramite Apps Script
    fetch(trackingUrl, {
      method: "GET",
      mode: "no-cors",
      cache: "no-store"
    }).catch(() => {});

    // prova ad aprire l'app Instagram
    window.location.href = instagramAppUrl;

    // fallback al profilo web se l'app non si apre
    setTimeout(function () {
      window.location.href = instagramWebUrl;
    }, 1200);
  </script>
</body>
</html>
