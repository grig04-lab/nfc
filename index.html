<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Redirect</title>
</head>
<body>
  <script>
    // crea/incrementa il contatore
    var img = new Image();
    img.src = "https://countapi.mileshilliard.com/api/v1/hit/leonardogriguolo_instagram_nfc?nocache=" + Date.now();

    // aspetta mezzo secondo così il conteggio parte prima del redirect
    setTimeout(function () {
      var ua = navigator.userAgent || navigator.vendor || window.opera;

      if (/android/i.test(ua)) {
        window.location.href = "intent://www.instagram.com/leonardogriguolo/#Intent;package=com.instagram.android;scheme=https;end";
      } else {
        window.location.href = "instagram://user?username=leonardogriguolo";
      }

      // fallback web
      setTimeout(function () {
        window.location.href = "https://www.instagram.com/leonardogriguolo/";
      }, 1200);
    }, 500);
  </script>
</body>
</html>
